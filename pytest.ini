[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts =
    -v
    --cov=core
    --cov=api
    --cov=agents
    --cov=memory
    --cov=jarvis.py
    --cov=main.py
    --cov=enhanced_autonomy.py
    --cov-report=term-missing
    --cov-report=html:coverage-report
    --cov-fail-under=80
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
