# JARVIS v9.0 Security Configuration
# PhD-level enterprise security settings

[security]
# Authentication settings
jwt_secret = ${JWT_SECRET:-your-super-secure-jwt-secret-here}
jwt_expiration = ${JWT_EXPIRATION:-3600}
jwt_refresh_expiration = ${JWT_REFRESH_EXPIRATION:-86400}

# Rate limiting
rate_limit_enabled = true
rate_limit_window = 60  # seconds
rate_limit_max_requests = 100  # per window

# Password security
password_min_length = 12
password_require_complexity = true
max_failed_attempts = 5
account_lockout_duration = 300  # seconds

# Session security
session_timeout = 1800  # 30 minutes
session_cleanup_interval = 300  # 5 minutes

[security.headers]
x_frame_options = "DENY"
x_content_type_options = "nosniff"
x_xss_protection = "1; mode=block"
strict_transport_security = "max-age=31536000; includeSubDomains"
content_security_policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"

[security.endpoints]
# Public endpoints (no authentication required)
public = [
    "/health",
    "/api/health"
]

# Protected endpoints (authentication required)
protected = [
    "/api/message",
    "/api/first-principles",
    "/api/automations",
    "/api/decision",
    "/api/agent-team",
    "/api/stats",
    "/api/optimize",
    "/api/synthesize-workflow",
    "/api/execute-workflow",
    "/api/skill-graph"
]

# Admin-only endpoints (elevated privileges required)
admin_only = [
    "/api/system/config",
    "/api/autonomous/enable",
    "/api/autonomous/disable",
    "/api/security/audit",
    "/api/security/health",
    "/api/system/stats"
]

[security.permissions]
# Role-based permissions
roles = {
    "admin": ["read", "write", "execute", "admin", "autonomous"],
    "user": ["read", "write", "execute"],
    "agent": ["execute"],
    "guest": ["read"]
}

# High-risk operations requiring admin privileges
high_risk_operations = [
    "access_autonomous",
    "manage_users",
    "system_admin",
    "read_audit_logs",
    "modify_system_config"
]

[security.monitoring]
# Audit logging
audit_log_enabled = true
audit_log_retention_days = 90
audit_log_level = "INFO"

# Security monitoring
security_alerts_enabled = true
failed_login_threshold = 5
suspicious_activity_detection = true

# Performance monitoring
response_time_alert_threshold = 5000  # milliseconds
error_rate_alert_threshold = 0.05  # 5%

[security.compliance]
# Compliance requirements
gdpr_compliant = true
data_retention_policy = "90 days"
data_encryption_required = true
access_logging_required = true

# Security scanning
vulnerability_scanning_enabled = true
dependency_scanning_enabled = true
secret_detection_enabled = true

[security.network]
# Network security
tls_enabled = true
tls_certificate_path = "/path/to/certificate.pem"
tls_private_key_path = "/path/to/private.key"
tls_min_version = "TLSv1.2"

# Firewall rules
allowed_ips = ["0.0.0.0/0"]  # Restrict in production
blocked_ips = []
blocked_countries = []

[security.api]
# API security
api_key_rotation_days = 30
api_versioning_enabled = true
api_deprecation_policy = "6 months"

# CORS settings
cors_enabled = false  # Disable in production unless needed
cors_allowed_origins = ["http://localhost:3000"]
cors_allowed_methods = ["GET", "POST", "PUT", "DELETE"]
cors_allowed_headers = ["Authorization", "Content-Type"]

[security.database]
# Database security
encryption_at_rest = true
encryption_in_transit = true
connection_pool_size = 10
connection_timeout = 30

# Database access controls
read_only_mode = false
backup_encryption = true
log_sensitive_data = false

[security.logging]
# Logging configuration
log_level = "INFO"
log_format = "json"
log_rotation = "daily"
log_retention_days = 30

# Security event logging
log_authentication_events = true
log_authorization_failures = true
log_privilege_escalation = true
log_data_access = true

[security.backup]
# Backup security
backup_encryption = true
backup_compression = true
backup_schedule = "daily"
backup_retention_days = 30

# Backup access controls
backup_access_roles = ["admin"]
backup_integrity_check = true

[security.incident_response]
# Incident response
incident_detection_enabled = true
incident_response_time_minutes = 15
escalation_policy = "immediate"

# Security notifications
security_notifications = true
notification_channels = ["email", "slack"]
security_contact_email = "security@jarvis.ai"

[security.development]
# Development security
debug_mode = false
detailed_errors = false
stack_traces = false

# Development overrides (remove in production)
disable_auth_for_development = false
mock_security_checks = false